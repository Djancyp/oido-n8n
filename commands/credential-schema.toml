name = "credential-schema"
description = "Get required fields for a credential type."

prompt = """
Get the credential schema for type {{type}} using n8n_get_credential_schema.
Show the required fields and their types so the user knows what data to provide.
"""

[parameters]
type = { type = "string", description = "Credential type name (e.g. httpBasicAuth, githubApi)", required = true }
