name = "workflow-status"
description = "Check workflow active status and validate its JSON."

prompt = """
Get workflow {{id}} using n8n_get_workflow to show its current status.
Show the name, whether it's active, and optionally run n8n_validate_workflow on it.
"""

[parameters]
id = { type = "string", description = "Workflow ID to check", required = true }
validate = { type = "boolean", description = "Also run n8n_validate_workflow on the workflow", required = false }
